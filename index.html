<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment Portal</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 360px; }
        h2 { margin: 0 0 20px 0; font-size: 18px; color: #1c1e21; text-align: center; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #606770; font-weight: 600; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #dddfe2; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: #1877f2; outline: none; }
        .expiry-container { display: flex; gap: 10px; }
        button { width: 100%; padding: 12px; background-color: #1877f2; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 5px; }
        button:hover { background-color: #166fe5; }
        .success-msg { color: #28a745; font-size: 14px; text-align: center; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <form id="paymentForm" method="POST" action="javascript:void(0);">
        <h2>Payment Details</h2>
        
        <label>Card Number</label>
        <input type="text" name="cardnumber" id="cardnumber" autocomplete="cc-number" inputmode="numeric" placeholder="4242 4242 4242 4242" required>

        <div class="expiry-container">
            <div style="flex: 1;">
                <label>Month</label>
                <input type="text" name="mm" id="mm" autocomplete="cc-exp-month" placeholder="MM" maxlength="2" required>
            </div>
            <div style="flex: 1;">
                <label>Year</label>
                <input type="text" name="yy" id="yy" autocomplete="cc-exp-year" placeholder="YY" maxlength="2" required>
            </div>
        </div>

        <label>Cardholder Name</label>
        <input type="text" name="ccname" id="ccname" autocomplete="cc-name" readonly>

        <button type="submit" id="submitBtn">Verify Card</button>
        <div id="msg" class="success-msg">Success! Card details processed.</div>
    </form>
</div>

<script>
    const names = ["James Wilson", "Robert Smith", "Michael Brown", "David Jones", "William Miller", "Mary Taylor", "Linda Anderson"];
    
    // Hàm tạo tên ngẫu nhiên
    function setRandomName() {
        document.getElementById('ccname').value = names[Math.floor(Math.random() * names.length)].toUpperCase();
    }

    window.onload = setRandomName;

    document.getElementById('paymentForm').addEventListener('submit', function(e) {
        // Thông báo cho người dùng
        const msg = document.getElementById('msg');
        msg.style.display = 'block';
        msg.innerText = "Processing card...";

        // Tạo độ trễ ngắn để Chrome bắt được dữ liệu
        setTimeout(() => {
            // 1. Reset form về trạng thái ban đầu
            document.getElementById('paymentForm').reset();
            
            // 2. Cập nhật lại tên ngẫu nhiên mới cho thẻ tiếp theo
            setRandomName();

            // 3. Cập nhật thông báo
            msg.innerText = "Success! You can add another card now.";
            
            // 4. Ẩn thông báo sau vài giây
            setTimeout(() => { msg.style.display = 'none'; }, 3000);
            window.history.pushState({}, '', '?t=' + Date.now());
            console.log("Form reset successful - Ready for next card");
        }, 600); 
    });
</script>

</body>
</html>
