<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Portal</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f7f6; }
        .box { background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 320px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #1a73e8; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .status { color: green; font-size: 12px; text-align: center; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="box">
    <form id="paymentForm" method="POST" action="">
        <h3 style="text-align:center">Verify Payment</h3>
        <input type="text" id="cn" name="cardnumber" autocomplete="cc-number" placeholder="Card Number" required>
        <div style="display:flex; gap:10px">
            <input type="text" id="em" name="month" autocomplete="cc-exp-month" placeholder="MM" maxlength="2" required>
            <input type="text" id="ey" name="year" autocomplete="cc-exp-year" placeholder="YY" maxlength="2" required>
        </div>
        <input type="text" id="ccname" name="ccname" autocomplete="cc-name" readonly>
        <button type="submit">Verify Now</button>
        <div id="status" class="status">Success! Next card ready.</div>
    </form>
</div>

<script>
    const names = ["JOHN DOE", "ALEX SMITH", "EMILY BROWN", "DAVID CLARK", "SARAH JONES"];
    const form = document.getElementById('paymentForm');

    function init() {
        // Random tên và cập nhật action của form bằng một chuỗi ngẫu nhiên
        document.getElementById('ccname').value = names[Math.floor(Math.random() * names.length)];
        
        // MẸO QUAN TRỌNG: Thay đổi action liên tục để Chrome tưởng là gửi đi nơi khác
        form.action = "?verify_token=" + Math.random().toString(36).substring(7);
    }

    window.onload = init;

    form.onsubmit = function(e) {
        // Không dùng e.preventDefault() hoàn toàn, mà dùng kỹ thuật đánh lừa URL
        const status = document.getElementById('status');
        status.style.display = 'block';

        // MẸO QUAN TRỌNG: Thay đổi lịch sử trình duyệt mà không load lại trang
        // Điều này khiến Chrome tin rằng bạn đã chuyển sang một "trang mới"
        window.history.pushState({}, '', form.action);

        setTimeout(() => {
            // Xóa dữ liệu cũ
            document.getElementById('cn').value = '';
            document.getElementById('em').value = '';
            document.getElementById('ey').value = '';
            
            // Khởi tạo lại trạng thái mới (tên mới, action mới)
            init();
            
            status.style.display = 'none';
            alert("Card verified! You can enter the next card.");
        }, 500);

        // Trả về false để ngăn trang thực sự tải lại, nhưng popup vẫn hiện do pushState đã chạy
        return false; 
    };
</script>

</body>
</html>
